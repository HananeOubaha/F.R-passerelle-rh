<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
    <!-- Animated background shapes -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -left-40 w-80 h-80 bg-indigo-500/10 rounded-full blur-3xl animate-pulse"></div>
        <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl animate-pulse" style="animation-delay: 1s;"></div>
        <div class="absolute top-1/3 right-1/4 w-64 h-64 bg-violet-500/5 rounded-full blur-3xl"></div>
    </div>

    <div class="max-w-md w-full animate-fade-in-up relative z-10">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-tr from-indigo-500 to-indigo-600 rounded-2xl shadow-lg shadow-indigo-500/30 mb-4">
                <span class="text-white font-black text-2xl">P</span>
            </div>
            <h1 class="text-2xl font-extrabold text-white tracking-tight">PASSERELLE <span class="text-indigo-400">RH</span></h1>
            <p class="text-slate-400 text-sm mt-1">Rejoignez la plateforme de compétences</p>
        </div>

        <!-- Register card -->
        <div class="bg-white/95 backdrop-blur-xl p-10 rounded-3xl shadow-2xl border border-white/20">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-extrabold text-slate-800">Créer un compte 🚀</h2>
                <p class="mt-2 text-sm text-slate-500">
                    Déjà inscrit ?
                    <a routerLink="/login" class="font-semibold text-indigo-600 hover:text-indigo-500 transition-colors">
                        Connectez-vous
                    </a>
                </p>
            </div>

            <form class="space-y-4" (ngSubmit)="onSubmit()">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label for="nom" class="block text-sm font-semibold text-slate-700 mb-1">Nom</label>
                        <input id="nom" name="nom" type="text" [(ngModel)]="userData.nom" required
                            class="w-full px-3.5 py-2.5 border border-slate-200 text-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500 transition-all text-sm bg-slate-50/50"
                            placeholder="Dupont" />
                    </div>
                    <div>
                        <label for="prenom" class="block text-sm font-semibold text-slate-700 mb-1">Prénom</label>
                        <input id="prenom" name="prenom" type="text" [(ngModel)]="userData.prenom" required
                            class="w-full px-3.5 py-2.5 border border-slate-200 text-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500 transition-all text-sm bg-slate-50/50"
                            placeholder="Marie" />
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-700 mb-1">Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <input id="email" name="email" type="email" [(ngModel)]="userData.email" required
                            class="pl-10 w-full px-3.5 py-2.5 border border-slate-200 text-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500 transition-all text-sm bg-slate-50/50"
                            placeholder="votre.email@exemple.com" />
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-700 mb-1">Mot de passe</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input id="password" name="password" type="password" [(ngModel)]="userData.password" required
                            class="pl-10 w-full px-3.5 py-2.5 border border-slate-200 text-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500 transition-all text-sm bg-slate-50/50"
                            placeholder="Minimum 6 caractères" />
                    </div>
                </div>

                <div>
                    <label for="ville" class="block text-sm font-semibold text-slate-700 mb-1">Ville <span class="text-slate-400 font-normal">(optionnel)</span></label>
                    <input id="ville" name="ville" type="text" [(ngModel)]="userData.ville"
                        class="w-full px-3.5 py-2.5 border border-slate-200 text-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500 transition-all text-sm bg-slate-50/50"
                        placeholder="Paris, Lyon, Casablanca..." />
                </div>

                <div>
                    <label for="role" class="block text-sm font-semibold text-slate-700 mb-1">Je suis</label>
                    <select id="role" name="role" [(ngModel)]="userData.role"
                        class="w-full px-3.5 py-2.5 border border-slate-200 bg-slate-50/50 text-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500 text-sm">
                        <option value="USER">👤 Utilisateur (bénévole / salarié)</option>
                        <option value="VALIDATOR">✅ Validateur (responsable / employeur)</option>
                    </select>
                    <p *ngIf="userData.role === 'VALIDATOR'" class="mt-1.5 text-xs text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-100">
                        En tant que validateur, vous pourrez évaluer et valider les missions des utilisateurs.
                    </p>
                </div>

                <div *ngIf="errorMessage" class="flex items-center gap-3 bg-red-50 border border-red-100 text-red-700 p-3 rounded-xl">
                    <svg class="w-5 h-5 text-red-400 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                    </svg>
                    <span class="text-sm font-medium">{{ errorMessage }}</span>
                </div>

                <button type="submit" [disabled]="isLoading"
                    class="w-full flex items-center justify-center gap-2 py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-gradient-to-r from-indigo-500 to-indigo-600 hover:from-indigo-600 hover:to-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-indigo-500/25 transition-all duration-200 active:scale-[0.98]">
                    <span *ngIf="!isLoading">S'inscrire</span>
                    <span *ngIf="isLoading" class="flex items-center gap-2">
                        <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                        Inscription...
                    </span>
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-slate-500 mt-6">© 2026 Passerelle RH • Preuve de Compétences Certifiée</p>
    </div>
</div>
