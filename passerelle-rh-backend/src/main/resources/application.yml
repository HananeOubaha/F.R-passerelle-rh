spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/passerelle_rh
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # Hibernate will create/update tables automatically
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com # Ou Mailtrap pour tes tests
    port: 587
    username: ${EMAIL_USER}
    password: ${EMAIL_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          auth0:
            client-id: fiFhu3nN6dmYH3HMUhmE8eYUimxlBdJS
            client-secret: KKBcrCjXSgKlD9K5du-pINiKDRLJhAco-4pAtMwiYD52wCkrh4lTKqnFJZphx8LX
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
        provider:
          auth0:
            issuer-uri: https://dev-70qiihqh664n4fm0.us.auth0.com/

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    disable-swagger-default-url: true
