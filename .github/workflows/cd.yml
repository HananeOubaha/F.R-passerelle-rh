name: Passerelle RH - CD Pipeline

on:
  push:
    tags:
      - 'v*' # Déclenchement sur les tags de version (ex: v1.0.0)
  workflow_dispatch: # Permet le déclenchement manuel

jobs:
  build-push-backend:
    name: Build & Push Backend Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file passerelle-rh-backend/pom.xml -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./passerelle-rh-backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/passerelle-rh-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/passerelle-rh-backend:${{ github.ref_name }}

  build-push-frontend:
    name: Build & Push Frontend Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./passerelle-rh-frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/passerelle-rh-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/passerelle-rh-frontend:${{ github.ref_name }}

  deploy:
    name: Deploy to Production
    needs: [build-push-backend, build-push-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/passerelle-rh
            # Login docker si image privée
            echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            
            # Pull des nouvelles images
            docker-compose pull
            
            # Redémarrage des services
            docker-compose up -d --remove-orphans

