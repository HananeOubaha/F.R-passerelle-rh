name: Passerelle RH - CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:

  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file passerelle-rh-backend/pom.xml -DskipTests

      - name: Run Tests
        run: mvn -B test --file passerelle-rh-backend/pom.xml

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: passerelle-rh-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: passerelle-rh-frontend

      - name: Run Unit Tests
        run: npm test -- --watch=false --browsers=ChromeHeadless
        working-directory: passerelle-rh-frontend

      - name: Build Angular app
        run: npm run build -- --configuration production
        working-directory: passerelle-rh-frontend

